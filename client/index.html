<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no" />
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#f97316" />
    <meta name="background-color" content="#ffffff" />
    <!-- SEO Meta Tags — replaced dynamically by server (bots) or React Helmet (users) -->
    <meta name="description" content="{{storeDescription}}" />
    <meta name="robots" content="index, follow" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="{{storeName}}" />
    <meta property="og:description" content="{{storeDescription}}" />
    <meta property="og:locale" content="ru_RU" />
    <meta property="og:site_name" content="{{storeName}}" />
    
    <!-- Additional SEO tags -->
    <meta name="format-detection" content="telephone=no" />
    <meta name="HandheldFriendly" content="true" />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/api/manifest" />
    
    <!-- Dynamic favicon based on PWA icon -->
    <link rel="icon" type="image/png" sizes="32x32" href="/api/favicon" />
    <link rel="icon" type="image/png" sizes="16x16" href="/api/favicon" />
    <link rel="shortcut icon" href="/api/favicon" />
    
    <!-- Apple Touch Icons -->
    <link rel="apple-touch-icon" sizes="180x180" href="/api/favicon" />
    <link rel="apple-touch-icon" sizes="152x152" href="/api/favicon" />
    <link rel="apple-touch-icon" sizes="144x144" href="/api/favicon" />
    <link rel="apple-touch-icon" sizes="120x120" href="/api/favicon" />
    
    <!-- iOS Safari -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="{{storeName}}" />
    
    <!-- Microsoft -->
    <meta name="msapplication-TileColor" content="#f97316" />
    
    <!-- Android -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="{{storeName}}" />
    
    <title>{{storeName}}</title>

    <style>
      #splash-screen {
        position: fixed;
        inset: 0;
        z-index: 99999;
        background: #ffffff;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 24px;
        transition: opacity 0.3s ease;
      }
      #splash-screen.hide {
        opacity: 0;
        pointer-events: none;
      }
      .splash-spinner {
        width: 48px;
        height: 48px;
        border: 4px solid #fed7aa;
        border-top-color: #f97316;
        border-radius: 50%;
        animation: splash-spin 0.8s linear infinite;
      }
      .splash-logo-text {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 28px;
        font-weight: 700;
        color: #f97316;
        letter-spacing: -0.5px;
      }
      @keyframes splash-spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body style="margin:0;background:#ffffff;">
    <div id="splash-screen">
      <div class="splash-logo-text" id="splash-store-name">●</div>
      <div class="splash-spinner"></div>
    </div>
    <div id="root"></div>
    <!-- Inject store name into splash screen and title as early as possible -->
    <script>
      (function() {
        var cached = null;
        try { cached = JSON.parse(sessionStorage.getItem('_storeSettings') || 'null'); } catch(e) {}
        function applyName(name) {
          if (!name) return;
          var el = document.getElementById('splash-store-name');
          if (el) el.textContent = name;
          if (document.title === '{{storeName}}' || document.title === '●') {
            document.title = name;
          }
          var appleTitle = document.querySelector('meta[name="apple-mobile-web-app-title"]');
          if (appleTitle && appleTitle.getAttribute('content') === '{{storeName}}') appleTitle.setAttribute('content', name);
          var appName = document.querySelector('meta[name="application-name"]');
          if (appName && appName.getAttribute('content') === '{{storeName}}') appName.setAttribute('content', name);
        }
        if (cached && cached.storeName) {
          applyName(cached.storeName);
        } else {
          fetch('/api/settings').then(function(r) { return r.json(); }).then(function(d) {
            if (d && d.storeName) {
              try { sessionStorage.setItem('_storeSettings', JSON.stringify({ storeName: d.storeName })); } catch(e) {}
              applyName(d.storeName);
            }
          }).catch(function() {});
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
